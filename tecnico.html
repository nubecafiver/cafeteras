<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CAFIVER Técnico</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
:root{
  --bg:#fff8f2; --surface:#fff8f2; --surface2:#f4ede6; --low:#faf2eb;
  --green:#154212; --green2:#002b02; --greenSoft:#9dd090;
  --amber:#904d00; --amber2:#fca558; --error:#ba1a1a;
  --text:#1e1b17; --text2:#42493e; --muted:#72796e; --border:#dcd5cc;
  --clayL:#ffffff; --clayD:#e5e2d9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
.serif{font-family:'Source Serif 4',serif}
.clay{background:var(--surface);border-radius:18px;box-shadow:-5px -5px 10px var(--clayL),5px 5px 14px var(--clayD)}
.clay-inset{background:var(--surface2);box-shadow:inset 2px 2px 5px var(--clayD),inset -2px -2px 5px var(--clayL)}
.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.num{font-family:'Source Serif 4',serif;color:var(--green);line-height:1}
input,select,textarea,button{font-family:inherit;font-size:16px}
.fld{width:100%;padding:12px 14px;border:none;border-radius:12px;background:var(--surface2);box-shadow:inset 2px 2px 5px var(--clayD),inset -2px -2px 5px var(--clayL);color:var(--text);outline:none}
.fld:focus{box-shadow:inset 2px 2px 5px var(--clayD),inset -2px -2px 5px var(--clayL),0 0 0 2px rgba(21,66,18,.25)}
.btn{border:none;border-radius:14px;padding:13px 16px;font-weight:700;font-size:15px;cursor:pointer;background:var(--surface);color:var(--text);box-shadow:-3px -3px 6px var(--clayL),3px 3px 8px var(--clayD)}
.btn:active{box-shadow:inset 2px 2px 6px var(--clayD),inset -2px -2px 6px var(--clayL)}
.btn-green{background:var(--green);color:#fff}
.btn-amber{background:var(--amber2);color:#713b00}
.chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:999px}
.chip-c{background:rgba(21,66,18,.12);color:var(--green)}
.chip-b{background:rgba(144,77,0,.14);color:var(--amber)}
.chip-r{background:rgba(186,26,26,.12);color:var(--error)}
/* App shell */
#app{display:none;min-height:100vh;padding-bottom:76px}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.topbar img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.view{padding:0 16px 20px;display:none}
.view.on{display:block}
.card-pad{padding:15px 16px}
/* Bottom nav */
.bnav{position:fixed;left:0;right:0;bottom:0;background:var(--low);box-shadow:0 -3px 14px rgba(21,66,18,.08);display:flex;justify-content:space-around;padding:8px 6px 10px;z-index:100}
.bnav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text2);font-size:10px;font-weight:700;letter-spacing:.03em;cursor:pointer;flex:1}
.bnav button .ic{font-size:20px;line-height:1}
.bnav button.on{color:var(--green)}
.bnav button.scan{margin-top:-24px}
.bnav button.scan .ring{width:52px;height:52px;border-radius:50%;background:var(--amber2);display:flex;align-items:center;justify-content:center;color:#713b00;box-shadow:-3px -3px 7px var(--clayL),4px 4px 10px var(--clayD)}
/* Login */
#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
#login img{width:96px;height:96px;border-radius:50%;object-fit:cover;box-shadow:0 6px 24px rgba(21,66,18,.25);margin-bottom:18px}
/* Modal / sheet */
.sheet{position:fixed;inset:0;background:rgba(30,27,23,.5);display:none;align-items:flex-end;z-index:300}
.sheet.on{display:flex}
.sheet-card{background:var(--bg);width:100%;max-height:94vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;overflow:hidden}
.sheet-hd{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.sheet-ft{padding:10px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.sheet-ft .btn{flex:1;justify-content:center}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#scanWrap{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:400}
#scanWrap video{width:100%;height:100%;object-fit:cover}
#sigcv{width:100%;height:160px;border-radius:12px;background:#fff;touch-action:none;border:1px solid var(--border)}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
.toast.on{opacity:1}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp 1s linear infinite;margin:30px auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

function $(id){return document.getElementById(id);}

// ══════════ AUTH ══════════
function doLogin(){
  var em=$('lg-email').value.trim(), pw=$('lg-pass').value.trim();
  $('lg-err').textContent='';
  if(!em||!pw){$('lg-err').textContent='Escribe correo y contraseña.';return;}
  $('lg-err').textContent='Entrando...';
  auth.signInWithEmailAndPassword(em,pw).then(function(){ $('lg-err').textContent=''; }).catch(function(e){
    var msg;
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') msg='Correo o contraseña incorrectos.';
    else if(e.code==='auth/user-not-found') msg='Ese correo no está registrado.';
    else if(e.code==='auth/invalid-email') msg='El correo no tiene formato válido.';
    else if(e.code==='auth/network-request-failed') msg='Sin conexión a internet.';
    else if(e.code==='auth/too-many-requests') msg='Demasiados intentos. Espera un momento.';
    else if(e.code&&(e.code.indexOf('api-key')>=0||e.code.indexOf('invalid-api')>=0)) msg='Configuración de Firebase incorrecta (revisa firebaseConfig).';
    else msg=e.message;
    $('lg-err').textContent = msg+'  ['+(e.code||'?')+']';
    console.error('login error:', e);
  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(function(user){
  if(!user){ $('app').style.display='none'; $('login').style.display='flex'; return; }
  // Leer perfil usuarios/{uid}
  db.collection('usuarios').doc(user.uid).get().then(function(d){
    if(!d.exists){
      $('lg-err').textContent='Tu usuario no tiene perfil asignado. Pide al admin que lo dé de alta.';
      auth.signOut(); return;
    }
    CUR = {uid:user.uid, email:user.email, ...d.data()};
    if(CUR.activo===false){ $('lg-err').textContent='Usuario inactivo.'; auth.signOut(); return; }
    MI_CENTRO = CUR.centro||'';
    arrancarApp();
  }).catch(function(e){ $('lg-err').textContent='Error al leer perfil: '+e.message; });
});

function arrancarApp(){
  $('login').style.display='none';
  $('app').style.display='block';
  $('tb-sub').textContent = CUR.nombre||CUR.email;
  $('tb-centro').textContent = MI_CENTRO || (CUR.rol==='director'?'TODOS':'—');
  $('pf-nombre').textContent = CUR.nombre||'—';
  $('pf-email').textContent = CUR.email||'—';
  $('pf-rol').textContent = CUR.rol||'—';
  $('pf-centro').textContent = MI_CENTRO?('Centro '+MI_CENTRO):'Todos los centros';
  // Cargar catálogo de centros (1 lectura por doc, pocos centros)
  db.collection('centros').limit(60).get().then(function(s){ s.docs.forEach(function(d){_catCentros[d.id]=d.data();}); $('tb-title').textContent = MI_CENTRO?centroNombre(MI_CENTRO):'Mi oficina'; }).catch(function(){});
  cargarInicio();
}

// ══════════ QUERY HELPER: siempre acotado al centro del técnico ══════════
function queryMisEquipos(extra){
  var q = db.collection('equipos');
  if(MI_CENTRO) q = q.where('centro','==',MI_CENTRO);
  return q;
}

// ══════════ NAVEGACIÓN ══════════
function nav(v){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  var el=$('v-'+v); if(el)el.classList.add('on');
  document.querySelectorAll('.bnav button[data-v]').forEach(function(b){b.classList.toggle('on',b.dataset.v===v);});
  if(v==='inicio')cargarInicio();
  if(v==='ordenes')cargarOrdenes();
  if(v==='pm')cargarPM();
}

// ══════════ INICIO ══════════
function cargarInicio(){
  // KPIs acotados: contar equipos del centro (limit para no leer de más) y órdenes abiertas
  queryMisEquipos().limit(1000).get().then(function(s){ $('k-equipos').textContent = s.size>=1000?'1000+':s.size; }).catch(function(){ $('k-equipos').textContent='—'; });
  var qo = db.collection('ordenes');
  qo = MI_CENTRO ? qo.where('centro','==',MI_CENTRO) : qo.where('tecnicoUid','==',CUR.uid);
  qo.where('estado','==','pendiente').limit(50).get().then(function(s){
    $('k-abiertas').textContent = s.size;
    var arr=s.docs.map(function(d){return {id:d.id,...d.data()};});
    renderPendientes(arr);
  }).catch(function(e){ $('k-abiertas').textContent='—'; $('pendientes').innerHTML='<div style="color:var(--muted);font-size:13px">No se pudieron cargar pendientes.</div>'; });
}
function renderPendientes(arr){
  if(!arr.length){ $('pendientes').innerHTML='<div class="clay card-pad" style="text-align:center;color:var(--muted);font-size:13px">Sin pendientes. ¡Buen trabajo!</div>'; return; }
  $('pendientes').innerHTML = arr.map(function(o){
    return '<div class="clay card-pad" style="margin-bottom:10px" onclick="verOrden(\''+o.id+'\')">'
      +'<div style="display:flex;justify-content:space-between;align-items:start;gap:8px">'
      +'<div><div style="font-weight:700;font-size:14px">'+esc(o.modelo||'Equipo')+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+esc(o.cliente||'—')+'</div></div>'
      +'<span class="chip '+(o.tipo==='correctivo'?'chip-r':'chip-c')+'">'+(o.tipo==='correctivo'?'CORRECTIVO':'PREVENTIVO')+'</span>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:6px;font-family:monospace">'+esc(o.folio||'')+' · AF '+esc(o.activoFijo||'')+'</div>'
      +'</div>';
  }).join('');
}

// ══════════ EQUIPOS ══════════
function buscarEquipos(){
  var q=($('eq-q').value||'').trim();
  if(q.length<2){ $('eq-list').innerHTML='<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">Escribe al menos 2 caracteres.</div>'; return; }
  $('eq-list').innerHTML='<div class="spin"></div>';
  var col=db.collection('equipos'), proms=[];
  var af=parseInt(q);
  if(!isNaN(af)) proms.push(col.where('activoFijo','==',af).limit(20).get());
  proms.push(col.where('serie','==',q).limit(20).get());
  Promise.all(proms).then(function(snaps){
    var seen={},arr=[];
    snaps.forEach(function(s){s.docs.forEach(function(d){ if(seen[d.id])return; seen[d.id]=true;
      var e={id:d.id,...d.data()};
      if(MI_CENTRO && e.centro!==MI_CENTRO) return;   // solo mi oficina
      arr.push(e);
    });});
    // filtro por modelo en cliente (sobre lo ya traído)
    if(isNaN(af)){ var ql=q.toLowerCase(); arr=arr.filter(function(e){return (e.serie||'').toLowerCase()===ql||(e.modelo||'').toLowerCase().includes(ql)||String(e.activoFijo||'').includes(q);}); }
    renderEquipos(arr);
  }).catch(function(e){ $('eq-list').innerHTML='<div style="color:var(--error);padding:16px;font-size:13px">'+esc(e.message)+'</div>'; });
}
function renderEquipos(arr){
  if(!arr.length){ $('eq-list').innerHTML='<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">Sin resultados en tu oficina.</div>'; return; }
  $('eq-list').innerHTML = arr.map(function(e){
    return '<div class="clay card-pad" style="margin-bottom:10px" onclick="verEquipo(\''+e.id+'\')">'
      +'<div style="display:flex;justify-content:space-between;gap:8px"><div style="font-weight:700;font-size:14px">'+esc(e.modelo||'Equipo')+'</div>'
      +'<span style="font-family:monospace;font-weight:700;color:var(--green);font-size:13px">'+esc(e.activoFijo||'')+'</span></div>'
      +'<div style="font-size:12px;color:var(--text2);margin-top:3px">'+esc(e.clienteNombre||'Bodega')+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:4px">'+esc(e.linea||'')+' · Serie '+esc(e.serie||'—')+'</div>'
      +'</div>';
  }).join('');
}
function verEquipo(docId){
  db.collection('equipos').doc(docId).get().then(function(d){
    if(!d.exists){toast('Equipo no encontrado');return;}
    _equipoActivo = {id:d.id,...d.data()};
    abrirFichaEquipo();
  });
}
function abrirFichaEquipo(){
  var e=_equipoActivo;
  $('sheet-title').textContent = e.modelo||'Equipo';
  $('sheet-body').innerHTML =
    '<div class="clay card-pad" style="margin-bottom:12px">'
    +row('Activo Fijo', e.activoFijo)+row('Serie', e.serie||'—')+row('Modelo', e.modelo||'—')
    +row('Línea', e.linea||'—')+row('Centro', centroNombre(e.centro))+row('Cliente', e.clienteNombre||'Bodega')
    +'</div>';
  $('sheet-ft').innerHTML = '<button class="btn btn-green" onclick="nuevaOrdenDesdeEquipo()">📋 Levantar orden</button>';
  openSheet();
}
function row(k,v){return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--muted)">'+k+'</span><span style="font-size:13px;font-weight:600;text-align:right">'+esc(v)+'</span></div>';}

// ══════════ ÓRDENES (lista) ══════════
function cargarOrdenes(){
  $('ord-list').innerHTML='<div class="spin"></div>';
  db.collection('ordenes').where('tecnicoUid','==',CUR.uid).limit(50).get().then(function(s){
    var arr=s.docs.map(function(d){return {id:d.id,...d.data()};});
    arr.sort(function(a,b){return (b.creadoEn&&b.creadoEn.seconds||0)-(a.creadoEn&&a.creadoEn.seconds||0);});
    if(!arr.length){ $('ord-list').innerHTML='<div class="clay card-pad" style="text-align:center;color:var(--muted);font-size:13px">Aún no has levantado órdenes.</div>'; return; }
    $('ord-list').innerHTML = arr.map(function(o){
      return '<div class="clay card-pad" style="margin-bottom:10px" onclick="verOrden(\''+o.id+'\')">'
        +'<div style="display:flex;justify-content:space-between;gap:8px"><span style="font-family:monospace;font-weight:700;font-size:13px;color:var(--green)">'+esc(o.folio||'')+'</span>'
        +'<span class="chip '+(o.estado==='terminado'?'chip-c':'chip-b')+'">'+esc(o.estado||'pendiente')+'</span></div>'
        +'<div style="font-weight:600;font-size:13px;margin-top:4px">'+esc(o.modelo||'')+'</div>'
        +'<div style="font-size:12px;color:var(--text2)">'+esc(o.cliente||'—')+' · '+fmt$(o.costoTotal)+'</div>'
        +'</div>';
    }).join('');
  }).catch(function(e){ $('ord-list').innerHTML='<div style="color:var(--error);padding:14px;font-size:13px">'+esc(e.message)+'</div>'; });
}
function verOrden(id){
  db.collection('ordenes').doc(id).get().then(function(d){
    if(!d.exists){toast('Orden no encontrada');return;}
    var o={id:d.id,...d.data()};
    _ordCerrar=o;
    $('sheet-title').textContent = o.folio||'Orden';
    $('sheet-body').innerHTML='<div class="clay card-pad">'
      +row('Folio',o.folio)+row('Equipo',o.modelo)+row('Cliente',o.cliente||'—')+row('Tipo',o.tipo)
      +row('Estado',o.estado)+row('Técnico',o.tecnicoNombre||'—')+row('Total',fmt$(o.costoTotal))
      +(o.descripcion?'<div style="margin-top:8px;font-size:12px;color:var(--text2)"><b>Trabajo:</b> '+esc(o.descripcion)+'</div>':'')
      +(o.firmado?'<div style="margin-top:8px;font-size:12px;color:var(--green)"><b>✓ Firmada</b>'+(o.emailCliente?(' · enviada a '+esc(o.emailCliente)):'')+'</div>':'')
      +'</div>';
    var esMia = o.tecnicoUid===CUR.uid;
    if(o.estado!=='terminado' && esMia){
      $('sheet-ft').innerHTML='<button class="btn" onclick="closeSheet()">Cerrar</button><button class="btn btn-green" onclick="abrirCierre()">✍️ Firmar y cerrar</button>';
    } else {
      $('sheet-ft').innerHTML='<button class="btn" onclick="closeSheet()">Cerrar</button>';
    }
    openSheet();
  });
}

// ══════════ CERRAR ORDEN: cliente firma + correo ══════════
var _ordCerrar=null;
function abrirCierre(){
  var o=_ordCerrar; if(!o)return;
  $('sheet-title').textContent='Firmar y cerrar · '+(o.folio||'');
  $('sheet-body').innerHTML=
    '<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Pásale el teléfono al cliente para que firme. Al cerrar, la orden queda terminada y podrás compartirla (WhatsApp, correo, etc.).</div>'
    +'<div class="frow"><label>Nombre de quien recibe</label><input class="fld" id="c-recibe" placeholder="Encargado de sucursal" value="'+esc(o.recibe||'')+'"></div>'
    +'<div class="frow"><label>Firma del cliente</label><canvas id="sig-cli" width="600" height="200" style="width:100%;height:170px;border-radius:12px;background:#fff;touch-action:none;border:1px solid var(--border)"></canvas>'
      +'<button class="btn" style="width:100%;margin-top:6px;padding:8px" onclick="limpiarFirma(\'cli\')">Borrar firma</button></div>';
  $('sheet-ft').innerHTML='<button class="btn" onclick="verOrden(\''+o.id+'\')">Atrás</button><button class="btn btn-green" onclick="cerrarOrden()">Cerrar orden</button>';
  setupCanvas('sig-cli','cli');
}
function cerrarOrden(){
  var o=_ordCerrar; if(!o)return;
  var fd=firmaData('cli');
  if(!fd){ toast('Falta la firma del cliente'); return; }
  var recibe=($('c-recibe').value||'').trim();
  $('sheet-ft').innerHTML='<button class="btn" disabled>Cerrando...</button>';
  db.collection('ordenes').doc(o.id).update({
    estado:'terminado', firmado:true, firmaClienteData:fd, recibe:recibe,
    cerradoEn:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    o.recibe=recibe; o.estado='terminado'; o.firmado=true;
    toast('✅ Orden cerrada');
    mostrarCompartir(o);   // pantalla de compartir
    cargarInicio(); cargarOrdenes();
  }).catch(function(e){ toast('Error al cerrar: '+e.message); abrirCierre(); });
}
// Pantalla final: compartir por el método que el técnico quiera (share nativo)
function mostrarCompartir(o){
  _ordCerrar=o;
  $('sheet-title').textContent='Orden cerrada · '+(o.folio||'');
  $('sheet-body').innerHTML=
    '<div class="clay card-pad" style="text-align:center;margin-bottom:14px">'
    +'<div style="font-size:34px">✅</div>'
    +'<div class="serif" style="font-size:18px;color:var(--green);margin-top:4px">Orden terminada</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:4px">'+esc(o.folio||'')+' · '+esc(o.cliente||'')+'</div>'
    +'</div>'
    +'<div style="font-size:13px;color:var(--text2);margin-bottom:10px">Comparte el comprobante con el cliente:</div>'
    +'<pre style="white-space:pre-wrap;font-family:inherit;font-size:12px;background:var(--surface2);border-radius:12px;padding:12px;box-shadow:inset 2px 2px 5px var(--clayD),inset -2px -2px 5px var(--clayL);color:var(--text2)">'+esc(resumenOrdenTexto(o))+'</pre>';
  $('sheet-ft').innerHTML='<button class="btn" onclick="closeSheet()">Listo</button><button class="btn btn-green" onclick="compartirOrden()">📤 Compartir</button>';
}
function compartirOrden(){
  var o=_ordCerrar; if(!o)return;
  var texto=resumenOrdenTexto(o);
  var titulo='Orden de servicio '+(o.folio||'')+' - CAFIVER';
  if(navigator.share){
    navigator.share({title:titulo, text:texto}).catch(function(e){ if(e && e.name!=='AbortError'){ copiarAlPortapapeles(texto); } });
  } else {
    copiarAlPortapapeles(texto);
  }
}
function copiarAlPortapapeles(txt){
  if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ toast('Resumen copiado — pégalo en WhatsApp o correo'); }).catch(function(){ toast('Copia manual el texto de arriba'); }); }
  else { toast('Copia manual el texto de arriba'); }
}

function openSheet(){ $('sheet').classList.add('on'); }
function closeSheet(){ $('sheet').classList.remove('on'); }

// ══════════ NUEVA ORDEN ══════════
var _ordEquipo = null;      // equipo asociado a la orden
var _ordFormato = 'estandar';

function nuevaOrden(){ _ordEquipo=null; abrirFormOrden(); }
function nuevaOrdenDesdeEquipo(){ _ordEquipo=_equipoActivo; abrirFormOrden(); }

function esBrillante(cliNum, cliNom){
  if(cliNum && CHECKLIST_BRILLANTE.clientes.indexOf(String(cliNum))>=0) return true;
  var n=(cliNom||'').toUpperCase();
  return n.indexOf('KRISPY')>=0 || n.indexOf('KREME')>=0;
}

function abrirFormOrden(){
  var e=_ordEquipo||{};
  var cliNum=e.cliente||'', cliNom=e.clienteNombre||'';
  _ordFormato = esBrillante(cliNum,cliNom)?'brillante':'estandar';
  $('sheet-title').textContent='Nueva orden';
  var hoy=new Date().toISOString().slice(0,10);
  var hora=new Date().toTimeString().slice(0,5);
  $('sheet-body').innerHTML =
    '<div class="frow"><label>Activo fijo</label><input class="fld" id="o-af" value="'+esc(e.activoFijo||'')+'" placeholder="No. activo"></div>'
    +'<div class="g2"><div class="frow"><label>Modelo</label><input class="fld" id="o-modelo" value="'+esc(e.modelo||'')+'"></div>'
    +'<div class="frow"><label>Serie</label><input class="fld" id="o-serie" value="'+esc(e.serie||'')+'"></div></div>'
    +'<div class="frow"><label>Cliente / Sucursal</label><input class="fld" id="o-cliente" value="'+esc(cliNom)+'" oninput="onClienteInput()"></div>'
    +'<div class="g2"><div class="frow"><label>Fecha</label><input class="fld" id="o-fecha" type="date" value="'+hoy+'"></div>'
    +'<div class="frow"><label>Hora</label><input class="fld" id="o-hora" type="time" value="'+hora+'"></div></div>'
    +'<div class="frow"><label>Tipo de servicio</label><select class="fld" id="o-tipo"><option value="correctivo">Correctivo</option><option value="preventivo" selected>Preventivo</option></select></div>'
    +'<div class="frow"><label>Formato de checklist</label><select class="fld" id="o-formato" onchange="onFormatoChange()">'
      +'<option value="estandar">Estándar (por línea)</option><option value="brillante">Checklist Brillante — Krispy Kreme</option></select>'
      +'<div id="o-fmt-hint" style="font-size:11px;color:var(--amber);margin-top:4px"></div></div>'
    +'<div class="frow"><label>Descripción del trabajo</label><textarea class="fld" id="o-desc" rows="2" placeholder="Qué se hizo..."></textarea></div>'
    +'<div id="o-checklist"></div>'
    +'<div class="serif" style="font-size:15px;color:var(--green);margin:14px 0 8px">Costos</div>'
    +'<div class="g2"><div class="frow"><label>Mano de obra</label><input class="fld" id="o-mo" type="number" inputmode="decimal" value="0" oninput="calcTotal()"></div>'
    +'<div class="frow"><label>Refacciones</label><input class="fld" id="o-ref" type="number" inputmode="decimal" value="0" oninput="calcTotal()"></div></div>'
    +'<div class="frow"><label>Viáticos</label><input class="fld" id="o-viat" type="number" inputmode="decimal" value="0" oninput="calcTotal()"></div>'
    +'<div class="clay card-pad" style="text-align:center;margin-bottom:8px"><span class="lbl">Total</span><div class="num" style="font-size:24px;margin-top:3px" id="o-total">$0.00</div></div>'
    +'<div class="serif" style="font-size:15px;color:var(--green);margin:14px 0 8px">Ubicación</div>'
    +'<button class="btn" style="width:100%" onclick="capturarUbicacion()">📍 &nbsp;Capturar mi ubicación</button>'
    +'<div id="o-geo" style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px">—</div>';
  $('sheet-ft').innerHTML='<button class="btn" onclick="closeSheet()">Cancelar</button><button class="btn btn-green" onclick="guardarOrden()">Guardar orden</button>';
  openSheet();
  $('o-formato').value=_ordFormato;
  _geoLat=null;_geoLng=null;
  capturarUbicacion();
  onFormatoChange(true);
}

function onClienteInput(){
  var nom=$('o-cliente').value;
  if(esBrillante('',nom)){ $('o-formato').value='brillante'; }
  onFormatoChange(true);
}
function onFormatoChange(auto){
  _ordFormato=$('o-formato').value;
  var hint=$('o-fmt-hint');
  var cont=$('o-checklist');
  if(_ordFormato==='brillante'){
    if(hint)hint.textContent = 'Formato Brillante (Krispy Kreme).';
    cont.innerHTML = renderBrillanteForm();
  } else {
    if(hint)hint.textContent='';
    cont.innerHTML = renderLineaForm();
  }
}
function renderLineaForm(){
  var lin = (_ordEquipo&&_ordEquipo.linea)||'';
  var items = CHECKLIST_LINEA[lin];
  if(!items){ return '<div style="font-size:12px;color:var(--muted);padding:8px 0">Sin checklist específico para esta línea ('+esc(lin||'—')+'). Usa la descripción del trabajo.</div>'; }
  return '<div class="serif" style="font-size:15px;color:var(--green);margin:14px 0 6px">Componentes — '+esc(lin)+'</div>'
    +'<div class="clay card-pad" style="padding:8px 12px">'
    +items.map(function(it,i){
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">'
        +'<span style="font-size:12px;flex:1">'+(i+1)+'. '+esc(it)+'</span>'
        +'<label style="font-size:10px;font-weight:700;color:var(--green)"><input type="checkbox" class="ckl-p" data-i="'+esc(it)+'" style="width:18px;height:18px;accent-color:#154212;vertical-align:middle"> Prev</label>'
        +'<label style="font-size:10px;font-weight:700;color:var(--error)"><input type="checkbox" class="ckl-c" data-i="'+esc(it)+'" style="width:18px;height:18px;accent-color:#ba1a1a;vertical-align:middle"> Corr</label>'
        +'</div>';
    }).join('')+'</div>';
}
function renderBrillanteForm(){

// ══════════ GEOLOCALIZACIÓN ══════════
var _geoLat=null, _geoLng=null;
function capturarUbicacion(){
  var el=$('o-geo'); if(el)el.textContent='Obteniendo ubicación...';
  if(!navigator.geolocation){ if(el)el.textContent='Este dispositivo no da ubicación.'; return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    _geoLat=pos.coords.latitude; _geoLng=pos.coords.longitude;
    if(el)el.innerHTML='📍 Ubicación capturada ('+_geoLat.toFixed(5)+', '+_geoLng.toFixed(5)+')';
  },function(err){
    if(el)el.textContent='No se pudo obtener ubicación (permiso denegado o sin señal).';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

// ══════════ FIRMAS (canvas táctil) ══════════
var _sig={};
function initFirmas(){ ['cli','tec'].forEach(function(w){ setupCanvas('sig-'+w,w); }); }
function setupCanvas(id,key){
  var cv=$(id); if(!cv)return; var ctx=cv.getContext('2d');
  ctx.lineWidth=2.5;ctx.lineCap='round';ctx.strokeStyle='#154212';
  _sig[key]={cv:cv,ctx:ctx,drawing:false,dirty:false};
  function pos(ev){var r=cv.getBoundingClientRect();var t=ev.touches?ev.touches[0]:ev;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};}
  function start(ev){ev.preventDefault();_sig[key].drawing=true;_sig[key].dirty=true;var p=pos(ev);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(ev){if(!_sig[key].drawing)return;ev.preventDefault();var p=pos(ev);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){_sig[key].drawing=false;}
  cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
}
function limpiarFirma(key){var s=_sig[key];if(!s)return;s.ctx.clearRect(0,0,s.cv.width,s.cv.height);s.dirty=false;}
function firmaData(key){var s=_sig[key];return (s&&s.dirty)?s.cv.toDataURL('image/png'):null;}

// ══════════ GUARDAR ORDEN ══════════
function guardarOrden(){
  var af=$('o-af').value.trim();
  if(!af){toast('Falta el activo fijo');return;}
  var ck=[], ckLinea=[];
  if(_ordFormato==='estandar'){
    document.querySelectorAll('#o-checklist .ckl-p').forEach(function(cb){
      var it=cb.dataset.i; var corr=document.querySelector('.ckl-c[data-i="'+CSS.escape(it)+'"]');
      if(cb.checked||(corr&&corr.checked)) ckLinea.push({item:it,preventivo:cb.checked,correctivo:corr?corr.checked:false});
    });
  }
  var brillante=null;
  if(_ordFormato==='brillante'){
    brillante=[];
    CHECKLIST_BRILLANTE.secciones.forEach(function(sec){sec.items.forEach(function(it){
      var r=document.querySelector('input[name="brz-'+it.n+'"]:checked');
      var l=document.querySelector('.brz-l[data-n="'+it.n+'"]');
      brillante.push({n:it.n,punto:it.punto,ref:it.ref,seccion:sec.titulo,evaluacion:r?r.value:'',lectura:l?l.value:''});
    });});
  }
  var mo=parseFloat($('o-mo').value)||0, ref=parseFloat($('o-ref').value)||0, viat=parseFloat($('o-viat').value)||0;
  var data={
    folio:folio(), tipo:$('o-tipo').value, activoFijo:(parseInt(af)||af),
    serie:$('o-serie').value, modelo:$('o-modelo').value,
    centro:(_ordEquipo&&_ordEquipo.centro)||MI_CENTRO,
    cliente:$('o-cliente').value, clienteNum:(_ordEquipo&&_ordEquipo.cliente)||'',
    tecnicoNombre:CUR.nombre||CUR.email, tecnicoUid:CUR.uid,
    fechaServicio:$('o-fecha').value, horaInicio:$('o-hora').value,
    descripcion:$('o-desc').value,
    formato:_ordFormato, checklistLinea:ckLinea, brillante:brillante,
    costoManoObra:mo, costoRefacciones:ref, costoViaticos:viat, costoTotal:mo+ref+viat,
    lat:_geoLat, lng:_geoLng,
    estado:'pendiente', firmado:false, origen:'app_tecnico',
    creadoEn:firebase.firestore.FieldValue.serverTimestamp()
  };
  $('sheet-ft').innerHTML='<button class="btn" disabled>Guardando...</button>';
  db.collection('ordenes').add(data).then(function(){
    toast('✅ Orden '+data.folio+' guardada');
    closeSheet(); cargarInicio();
  }).catch(function(e){ toast('Error: '+e.message); abrirFormOrden(); });
}

// ══════════ ESCÁNER QR (ZXing 0.19.1, igual que el escritorio) ══════════
var _codeReader=null, _lastScan=null;
function openScan(){
  $('scanWrap').style.display='flex';
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ toast('Este navegador no permite usar la cámara.'); setTimeout(closeScan,2000); return; }
  if(typeof ZXing==='undefined'){ toast('El escáner no cargó. Revisa tu conexión y vuelve a abrir.'); setTimeout(closeScan,1800); return; }
  // 1) Pedir permiso + cámara trasera PRIMERO (dispara el aviso en Android de forma confiable)
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}).then(function(stream){
    stream.getTracks().forEach(function(t){t.stop();});  // soltar; ZXing abrirá el suyo
    iniciarZXing();
  }).catch(function(e){
    console.error('getUserMedia:',e);
    var m = (e.name==='NotAllowedError'||e.name==='SecurityError') ? 'Permiso de cámara denegado. Tócale al candado ⓘ junto a la dirección → Permisos → Cámara → Permitir, y recarga.' :
            e.name==='NotFoundError' ? 'No se encontró ninguna cámara en el dispositivo.' :
            e.name==='NotReadableError' ? 'La cámara está siendo usada por otra app. Ciérrala e intenta de nuevo.' :
            'No se pudo abrir la cámara ('+(e.name||e.message)+').';
    toast(m); setTimeout(closeScan,3500);
  });
}
function iniciarZXing(){
  function cb(result,err){
    if(result){
      var data=result.getText()||'';
      var af=null;
      if(data.includes('af='))af=data.split('af=')[1].split('&')[0].trim();
      else if(/^\d+$/.test(data.trim()))af=data.trim();
      else af=data.trim();
      if(af&&af!==_lastScan){
        _lastScan=af;
        if(navigator.vibrate)navigator.vibrate([100,50,100]);
        closeScan();
        $('eq-q').value=af; nav('equipos'); buscarEquipos();
      }
    }
    if(err&&!(err instanceof ZXing.NotFoundException))console.warn('ZXing:',err);
  }
  try{
    _codeReader=new ZXing.BrowserQRCodeReader();
    _codeReader.listVideoInputDevices().then(function(devices){
      var deviceId;
      devices.forEach(function(d){
        var l=(d.label||'').toLowerCase();
        if(l.includes('back')||l.includes('rear')||l.includes('trasera')||l.includes('environment'))deviceId=d.deviceId;
      });
      if(!deviceId&&devices.length>0)deviceId=devices[devices.length-1].deviceId;
      _codeReader.decodeFromVideoDevice(deviceId,'scanVideo',cb);
    }).catch(function(e){
      // Si enumerar falla, usar la cámara por defecto
      console.warn('listVideoInputDevices falló, uso cámara por defecto:',e);
      _codeReader.decodeFromVideoDevice(null,'scanVideo',cb);
    });
  }catch(e){ console.error(e); toast('Error del escáner: '+e.message); setTimeout(closeScan,2000); }
}
function closeScan(){ $('scanWrap').style.display='none'; if(_codeReader){try{_codeReader.reset();}catch(e){}_codeReader=null;} _lastScan=null; }
